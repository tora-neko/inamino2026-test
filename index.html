    <div id="name-display">
        <span class="hint">← 写真の人物をタップ（クリック）してください</span>
    </div>
    <p class="hint-bar">タップすると下に名前が表示されます(敬称略)</p>

    <script>
        const display = document.getElementById('name-display');
        let lastTapped = null;

        document.querySelectorAll('.clickable-area').forEach(function(area) {
            area.addEventListener('touchend', function(e) {
                e.preventDefault();
                showName(this);
            });
            area.addEventListener('click', function(e) {
                showName(this);
            });
        });

        function showName(el) {
            if (lastTapped && lastTapped !== el) {
                lastTapped.classList.remove('tapped');
            }
            el.classList.add('tapped');
            lastTapped = el;
            display.innerHTML = '<span class="name-text">' + el.dataset.name + '</span>';
        }

        document.getElementById('main-photo').addEventListener('click', function() {
            if (lastTapped) {
                lastTapped.classList.remove('tapped');
                lastTapped = null;
            }
            display.innerHTML = '<span class="hint">← 写真の人物をタップ（クリック）してください</span>';
        });
    </script>
